<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1D9E75" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Maestria no Atendimento" />
<meta name="description" content="Checklist de avaliação de atendimento por etapas de maestria" />
<title>Maestria no Atendimento</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:       #1D9E75;
    --green-light: #E1F5EE;
    --green-mid:   #9FE1CB;
    --green-dark:  #0F6E56;
    --green-deep:  #085041;
    --amber-light: #FAEEDA;
    --amber-dark:  #854F0B;
    --red-light:   #FAECE7;
    --red-dark:    #993C1D;
    --bg:          #F2F1ED;
    --surface:     #FFFFFF;
    --surface2:    #ECEAE4;
    --border:      rgba(0,0,0,0.09);
    --border-md:   rgba(0,0,0,0.16);
    --text:        #191917;
    --text-mid:    #55534E;
    --text-muted:  #8A877F;
    --r:           14px;
    --r-sm:        9px;
  }

  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 0 0 4rem;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .page { max-width: 720px; margin: 0 auto; padding: 0 1rem; }

  /* ---- Header ---- */
  .page-header { margin-bottom: 1rem; text-align: center; padding-top: 1.1rem; }
  .page-header h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
  .page-header p  { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }

  /* ---- Save indicator ---- */
  .save-indicator {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green-dark);
    background: var(--green-light);
    border: 1px solid var(--green-mid);
    padding: 5px 10px 5px 8px;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
  }
  .save-indicator.show { opacity: 1; transform: translateY(0); }
  .save-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }

  /* ---- Store tabs (top level) ---- */
  .store-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 1rem 0.85rem;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border-md);
    margin-bottom: 0.7rem;
  }
  .store-tabs::-webkit-scrollbar { display: none; }

  .store-tab {
    flex-shrink: 0;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-mid);
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 20px;
    padding: 9px 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .store-tab.active {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .store-tab.add-store {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px dashed var(--border-md);
  }
  .store-tab.add-store:active { background: var(--surface2); }

  /* ---- Sub tabs (Cadastro / vendedoras) ---- */
  .sub-tabs {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    padding: 0 0 0.85rem;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.9rem;
  }
  .sub-tabs::-webkit-scrollbar { display: none; }

  .sub-tab {
    flex-shrink: 0;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-mid);
    background: var(--surface);
    border: 1.5px solid var(--border-md);
    border-radius: var(--r-sm);
    padding: 7px 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .sub-tab.active {
    background: var(--green-light);
    color: var(--green-deep);
    border-color: var(--green);
  }
  .sub-tab .sub-tab-pct {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .sub-tab.active .sub-tab-pct { color: var(--green-dark); }
  .sub-tab.cadastro-tab { font-weight: 600; }

  /* ---- Cards ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1.1rem 1.15rem;
    margin-bottom: 0.85rem;
  }

  .sec-label {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* ---- Form fields (Cadastro) ---- */
  .field-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .field-group:last-child { margin-bottom: 0; }
  .field-group label { font-size: 12px; color: var(--text-mid); font-weight: 500; }

  .text-field, .text-area {
    background: var(--surface2);
    border: 1.5px solid var(--border-md);
    border-radius: var(--r-sm);
    padding: 12px 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s, background 0.15s;
  }
  .text-field:focus, .text-area:focus {
    outline: none;
    border-color: var(--green);
    background: var(--surface);
  }
  .text-area { min-height: 76px; resize: vertical; line-height: 1.45; }

  /* iOS Safari renders the native date control with intrinsic width that can
     overflow narrow flex children; tighten padding and force it to respect
     the parent's box so two date fields never overlap on narrow screens. */
  input[type="date"].text-field {
    padding: 12px 8px;
    min-width: 0;
    -webkit-appearance: none;
    appearance: none;
  }

  .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field-row .field-group { flex: 1 1 130px; min-width: 130px; }

  /* ---- Vendedoras list (Cadastro) ---- */
  .vend-list { display: flex; flex-direction: column; gap: 8px; }
  .vend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1.5px solid var(--border-md);
    border-radius: var(--r-sm);
    padding: 8px 8px 8px 13px;
  }
  .vend-row input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    color: var(--text);
    min-width: 0;
  }
  .vend-row input:focus { outline: none; }
  .vend-row .vend-remove {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 8px;
    border: none;
    background: var(--red-light);
    color: var(--red-dark);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-add-vend {
    margin-top: 10px;
    width: 100%;
    padding: 11px;
    border-radius: var(--r-sm);
    border: 1.5px dashed var(--border-md);
    background: transparent;
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-add-vend:active { background: var(--surface2); }

  /* ---- Checklist header info (CP / Atendente / Ciclo) ---- */
  .info-grid { display: flex; flex-direction: column; gap: 10px; }

  /* ---- Adherence summary ---- */
  .adh-overall {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }
  .adh-ring {
    flex-shrink: 0;
    width: 72px; height: 72px;
    position: relative;
  }
  .adh-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .adh-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .adh-ring-fill { fill: none; stroke: var(--green); stroke-width: 8; stroke-linecap: round; transition: stroke-dasharray 0.4s ease; }
  .adh-ring-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 17px; font-weight: 600; color: var(--text);
  }
  .adh-overall-text { flex: 1; }
  .adh-overall-text .big { font-size: 14px; font-weight: 600; color: var(--text); }
  .adh-overall-text .small { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .adh-bycat { display: flex; flex-direction: column; gap: 9px; }
  .adh-bycat-row { display: flex; align-items: center; gap: 10px; }
  .adh-bycat-name { font-size: 12.5px; font-weight: 500; color: var(--text-mid); width: 88px; flex-shrink: 0; }
  .adh-bycat-track { flex: 1; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .adh-bycat-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s ease; }
  .adh-bycat-pct { font-family: 'DM Mono', monospace; font-size: 11.5px; font-weight: 600; color: var(--text-mid); width: 38px; text-align: right; flex-shrink: 0; }

  /* ---- Etapa block ---- */
  .etapa-block { margin-bottom: 14px; }
  .etapa-block:last-child { margin-bottom: 0; }
  .etapa-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 0 2px;
  }
  .etapa-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--green-deep);
    letter-spacing: -0.01em;
  }
  .etapa-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .check-item {
    background: var(--surface);
    border: 1.5px solid var(--border-md);
    border-radius: var(--r-sm);
    padding: 12px 13px;
    margin-bottom: 8px;
  }
  .check-item:last-child { margin-bottom: 0; }
  .check-item.on { border-color: var(--green); background: var(--green-light); }

  .check-main {
    display: flex;
    align-items: flex-start;
    gap: 11px;
  }

  .check-box {
    width: 26px; height: 26px;
    border-radius: 7px;
    border: 2px solid var(--border-md);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  /* Invisible larger hit area around the visual checkbox, so touch/click works
     even when tapping slightly outside the 26x26 box, without changing how the box looks. */
  .check-box::before {
    content: '';
    position: absolute;
    top: -8px; left: -8px; right: -8px; bottom: -8px;
  }
  .check-item.on .check-box { background: var(--green); border-color: var(--green); }
  .check-box::after {
    content: '';
    display: none;
    position: absolute;
    left: 50%; top: 50%;
    width: 7px; height: 12px;
    margin: -8px 0 0 -5px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }
  .check-item.on .check-box::after { display: block; }

  .check-text { flex: 1; font-size: 13.5px; line-height: 1.42; color: var(--text); font-weight: 500; }
  .check-item.on .check-text { color: var(--green-deep); }

  .check-comment-toggle {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 7px;
    border: 1.5px solid var(--border-md);
    background: var(--surface);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-top: 1px;
  }
  .check-comment-toggle svg { width: 13px; height: 13px; flex-shrink: 0; }
  .check-comment-toggle.has-text { border-color: var(--amber-dark); color: var(--amber-dark); background: var(--amber-light); }

  .check-comment-wrap { margin-top: 9px; padding-left: 37px; display: none; }
  .check-comment-wrap.show { display: block; }
  .check-comment {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border-md);
    border-radius: 8px;
    padding: 9px 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    min-height: 56px;
    resize: vertical;
  }
  .check-comment:focus { outline: none; border-color: var(--green); background: var(--surface); }

  /* ---- Notes section (Pontos fortes etc) ---- */
  .notes-card .field-group { margin-bottom: 14px; }
  .notes-card .field-group:last-child { margin-bottom: 0; }
  .notes-label-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
  .notes-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .notes-dot.green  { background: var(--green); }
  .notes-dot.amber  { background: var(--amber-dark); }
  .notes-dot.blue   { background: #2563a8; }
  .notes-label-row label { font-size: 12.5px; font-weight: 600; color: var(--text); }

  /* ---- Action buttons ---- */
  .action-bar {
    display: flex;
    gap: 8px;
    margin-top: 1rem;
    margin-bottom: 1.5rem;
  }
  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 13px 10px;
    border-radius: var(--r-sm);
    border: 1.5px solid var(--border-md);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: var(--surface2); }
  .btn.btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
  .btn.btn-primary:active { background: var(--green-dark); }
  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .page-footer { text-align: center; margin-top: 1.2rem; font-size: 11px; color: var(--text-muted); padding-bottom: 1rem; }

  /* ---- Empty state ---- */
  .empty-state {
    text-align: center;
    padding: 2.5rem 1.5rem;
    color: var(--text-muted);
  }
  .empty-state p { font-size: 13.5px; line-height: 1.5; }
  .empty-state .emoji { font-size: 30px; margin-bottom: 10px; display: block; }

  /* ---- Modal (add store) ---- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1.25rem;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--surface);
    border-radius: var(--r);
    padding: 1.25rem;
    width: 100%;
    max-width: 360px;
  }
  .modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .modal-box p.modal-sub { font-size: 12.5px; color: var(--text-muted); margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions .btn { padding: 11px 10px; }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 11px 18px;
    border-radius: 24px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- Print capture target marker ---- */
  .capture-area { background: var(--bg); }

  @media (min-width: 600px) {
    .page { padding: 0 1.5rem; }
  }
</style>
</head>
<body>
<div class="save-indicator" id="save-indicator">
  <span class="dot"></span>
  <span id="save-indicator-text">Salvo automaticamente</span>
</div>

<div class="page">
  <div class="page-header">
    <h1>Maestria no Atendimento</h1>
    <p>Checklist de avaliação por etapas de maestria</p>
  </div>

  <div class="store-tabs" id="store-tabs"></div>

  <div id="sub-tabs-wrap">
    <div class="sub-tabs" id="sub-tabs"></div>
  </div>

  <div id="content-area" class="capture-area"></div>
</div>

<div class="modal-overlay" id="modal-add-store">
  <div class="modal-box">
    <h3>Nova loja</h3>
    <p class="modal-sub">Crie uma nova aba de loja para cadastrar vendedoras e checklists.</p>
    <div class="field-group">
      <label for="new-store-name">Nome da loja</label>
      <input type="text" class="text-field" id="new-store-name" placeholder="Ex: Boticário Shopping" autocomplete="off" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddStoreModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmAddStore()">Criar loja</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-confirm">
  <div class="modal-box">
    <h3 id="modal-confirm-title">Confirmar</h3>
    <p class="modal-sub" id="modal-confirm-text"></p>
    <div class="modal-actions">
      <button class="btn" onclick="closeConfirmModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm-btn" style="background:var(--red-dark);border-color:var(--red-dark);">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
(function () {
  'use strict';

  function g(id) { return document.getElementById(id); }
  function uid() { return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

  /* NodeList.forEach is not implemented on some older WebKit builds (notably
     embedded/legacy browsers); use a classic for-loop helper everywhere instead. */
  function forEachNode(nodeList, fn) {
    for (var i = 0; i < nodeList.length; i++) {
      fn(nodeList[i], i);
    }
  }

  /* =========================================================
     CHECKLIST TEMPLATE — etapas de maestria e itens fixos
     ========================================================= */
  var CHECKLIST_TEMPLATE = [
    {
      etapa: 'Conecta',
      itens: [
        'Se apresenta, caso não conheça o revendedor, e explica como vai ajudá-lo.',
        'Entende o motivo da visita: objetividade, oportunidade ou profissionalização.',
        'Pede CPF ou código do revendedor e inclui na VD ER.'
      ]
    },
    {
      etapa: 'Desenvolve',
      itens: [
        'Explora histórico e faz perguntas para compreender melhor o perfil do revendedor.',
        'Oferece produtos complementares e Multimarcas.',
        'Faz experimentação e usa alavancas do MCM (faixa e resgate) e crédito para argumentação.'
      ]
    },
    {
      etapa: 'Impulsiona',
      itens: [
        'Fala sobre as principais promoções do ciclo.',
        'Reforça sobre os lançamentos do ciclo.'
      ]
    },
    {
      etapa: 'Fideliza',
      itens: [
        'Elogia as escolhas do revendedor e reforça a lucratividade.',
        'Oferece gatilho de promoção final.',
        'Comenta sobre a pesquisa de satisfação.'
      ]
    }
  ];

  var TOTAL_ITENS = CHECKLIST_TEMPLATE.reduce(function (sum, e) { return sum + e.itens.length; }, 0);

  /* =========================================================
     ESTADO / PERSISTÊNCIA (localStorage)
     ========================================================= */
  var STORAGE_KEY = 'maestria_atendimento_v1';

  function defaultData() {
    return {
      lojas: [
        makeLoja('VD'),
        makeLoja('Botica'),
        makeLoja('Lubotica')
      ],
      focoCiclo: '',
      activeStoreId: null,
      activeSubTab: {} // storeId -> subtab key ('cadastro' or vendedoraId)
    };
  }

  function makeLoja(nome) {
    var id = uid();
    return {
      id: id,
      nome: nome,
      ciclo: { numero: '', dataInicio: '', dataFim: '' },
      vendedoras: []
    };
  }

  function makeVendedora(nome) {
    var checklist = {};
    CHECKLIST_TEMPLATE.forEach(function (etapa, ei) {
      etapa.itens.forEach(function (item, ii) {
        var key = ei + '_' + ii;
        checklist[key] = { checked: false, comentario: '' };
      });
    });
    return {
      id: uid(),
      nome: nome,
      checklist: checklist,
      pontosFortes: '',
      oportunidades: '',
      planoAcao: ''
    };
  }

  var DATA = null;

  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { return defaultData(); }
      var parsed = JSON.parse(raw);
      if (!parsed || !parsed.lojas || !parsed.lojas.length) { return defaultData(); }
      /* backfill missing fields for forward-compat */
      if (parsed.focoCiclo === undefined) {
        /* migração: versões antigas guardavam o foco por loja; pega o primeiro não vazio encontrado */
        var migratedFoco = '';
        parsed.lojas.forEach(function (loja) {
          if (!migratedFoco && loja.ciclo && loja.ciclo.foco) { migratedFoco = loja.ciclo.foco; }
        });
        parsed.focoCiclo = migratedFoco;
      }
      parsed.lojas.forEach(function (loja) {
        if (!loja.ciclo) { loja.ciclo = { numero: '', dataInicio: '', dataFim: '' }; }
        if (loja.ciclo.foco !== undefined) { delete loja.ciclo.foco; }
        if (!loja.vendedoras) { loja.vendedoras = []; }
        loja.vendedoras.forEach(function (v) {
          if (!v.checklist) { v.checklist = makeVendedora('').checklist; }
          if (v.pontosFortes === undefined) { v.pontosFortes = ''; }
          if (v.oportunidades === undefined) { v.oportunidades = ''; }
          if (v.planoAcao === undefined) { v.planoAcao = ''; }
        });
      });
      if (!parsed.activeSubTab) { parsed.activeSubTab = {}; }
      return parsed;
    } catch (e) {
      console.error('Erro ao carregar dados salvos:', e);
      return defaultData();
    }
  }

  var saveTimer = null;
  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      showSaveIndicator();
    } catch (e) {
      console.error('Erro ao salvar dados:', e);
      showToast('Não foi possível salvar automaticamente. Verifique o espaço de armazenamento do navegador.');
    }
  }

  function scheduleSave() {
    if (saveTimer) { clearTimeout(saveTimer); }
    saveTimer = setTimeout(saveData, 300);
  }

  function showSaveIndicator() {
    var el = g('save-indicator');
    el.className = 'save-indicator show';
    clearTimeout(showSaveIndicator._t);
    showSaveIndicator._t = setTimeout(function () {
      el.className = 'save-indicator';
    }, 1400);
  }

  function showToast(msg, ms) {
    var t = g('toast');
    t.textContent = msg;
    t.className = 'toast show';
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function () {
      t.className = 'toast';
    }, ms || 2600);
  }
/* SCRIPT_PART_2 */

  /* =========================================================
     HELPERS — loja / vendedora ativa
     ========================================================= */
  function getLoja(storeId) {
    for (var i = 0; i < DATA.lojas.length; i++) {
      if (DATA.lojas[i].id === storeId) { return DATA.lojas[i]; }
    }
    return null;
  }

  function getActiveLoja() {
    return getLoja(DATA.activeStoreId);
  }

  function getActiveSubTab(storeId) {
    var v = DATA.activeSubTab[storeId];
    return v || 'cadastro';
  }

  function setActiveSubTab(storeId, key) {
    DATA.activeSubTab[storeId] = key;
  }

  function getVendedora(loja, vendId) {
    if (!loja) { return null; }
    for (var i = 0; i < loja.vendedoras.length; i++) {
      if (loja.vendedoras[i].id === vendId) { return loja.vendedoras[i]; }
    }
    return null;
  }

  /* =========================================================
     ADERÊNCIA
     ========================================================= */
  function calcAderenciaVendedora(vend) {
    var total = TOTAL_ITENS;
    var marcados = 0;
    var porEtapa = CHECKLIST_TEMPLATE.map(function () { return { marcados: 0, total: 0 }; });

    CHECKLIST_TEMPLATE.forEach(function (etapa, ei) {
      etapa.itens.forEach(function (item, ii) {
        var key = ei + '_' + ii;
        porEtapa[ei].total++;
        if (vend.checklist[key] && vend.checklist[key].checked) {
          marcados++;
          porEtapa[ei].marcados++;
        }
      });
    });

    var pct = total > 0 ? (marcados / total) * 100 : 0;
    var porEtapaPct = porEtapa.map(function (e) {
      return e.total > 0 ? (e.marcados / e.total) * 100 : 0;
    });

    return { marcados: marcados, total: total, pct: pct, porEtapa: porEtapa, porEtapaPct: porEtapaPct };
  }

/* SCRIPT_PART_3 */

  /* =========================================================
     RENDER — abas de loja (nível 1)
     ========================================================= */
  function renderStoreTabs() {
    var wrap = g('store-tabs');
    var html = '';
    DATA.lojas.forEach(function (loja) {
      var active = loja.id === DATA.activeStoreId ? ' active' : '';
      html += '<div class="store-tab' + active + '" data-store="' + loja.id + '">' + escapeHtml(loja.nome) + '</div>';
    });
    html += '<div class="store-tab add-store" id="btn-add-store">+ Nova loja</div>';
    wrap.innerHTML = html;

    var tabs = wrap.querySelectorAll('.store-tab[data-store]');
    forEachNode(tabs, function (tab) {
      tab.addEventListener('click', function () {
        DATA.activeStoreId = tab.getAttribute('data-store');
        scheduleSave();
        renderAll();
      });
    });
    g('btn-add-store').addEventListener('click', openAddStoreModal);
  }

  /* =========================================================
     RENDER — sub-abas (Cadastro + vendedoras)
     ========================================================= */
  function renderSubTabs() {
    var loja = getActiveLoja();
    var wrap = g('sub-tabs');
    if (!loja) { wrap.innerHTML = ''; return; }

    var active = getActiveSubTab(loja.id);
    var html = '<div class="sub-tab cadastro-tab' + (active === 'cadastro' ? ' active' : '') + '" data-sub="cadastro">Dados da Loja</div>';

    loja.vendedoras.forEach(function (vend) {
      var isActive = active === vend.id;
      var adh = calcAderenciaVendedora(vend);
      var nome = vend.nome && vend.nome.trim() ? vend.nome : 'Sem nome';
      html += '<div class="sub-tab' + (isActive ? ' active' : '') + '" data-sub="' + vend.id + '">' +
        escapeHtml(nome) +
        '<span class="sub-tab-pct">' + Math.round(adh.pct) + '%</span>' +
        '</div>';
    });

    wrap.innerHTML = html;

    var tabs = wrap.querySelectorAll('.sub-tab');
    forEachNode(tabs, function (tab) {
      tab.addEventListener('click', function () {
        var subKey = tab.getAttribute('data-sub');
        setActiveSubTab(loja.id, subKey);
        scheduleSave();
        renderSubTabs();
        renderContent();
        var newActiveTab = wrap.querySelector('.sub-tab.active');
        if (newActiveTab) { newActiveTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }
      });
    });
  }

  function escapeHtml(str) {
    if (str === undefined || str === null) { return ''; }
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

/* SCRIPT_PART_4 */

  /* =========================================================
     RENDER — conteúdo principal (router)
     ========================================================= */
  function renderContent() {
    var loja = getActiveLoja();
    var area = g('content-area');
    if (!loja) {
      area.innerHTML = '<div class="empty-state"><span class="emoji">🏬</span><p>Nenhuma loja cadastrada.<br>Toque em "+ Nova loja" para começar.</p></div>';
      return;
    }
    var sub = getActiveSubTab(loja.id);
    if (sub === 'cadastro') {
      renderCadastro(loja, area);
    } else {
      var vend = getVendedora(loja, sub);
      if (!vend) {
        setActiveSubTab(loja.id, 'cadastro');
        renderCadastro(loja, area);
        renderSubTabs();
      } else {
        renderChecklist(loja, vend, area);
      }
    }
  }

/* SCRIPT_PART_5 */

  /* =========================================================
     RENDER — Cadastro (dados da loja, ciclo, vendedoras)
     ========================================================= */
  function buildCicloNumOptions(selected) {
    var html = '<option value="">Selecione...</option>';
    for (var i = 1; i <= 17; i++) {
      var sel = (String(i) === String(selected)) ? ' selected' : '';
      html += '<option value="' + i + '"' + sel + '>' + i + '</option>';
    }
    return html;
  }

  function renderCadastro(loja, area) {
    var html = '';

    html += '<div class="card">' +
      '<p class="sec-label">Dados do ciclo</p>' +
      '<div class="info-grid">' +
        '<div class="field-group">' +
          '<label for="cad-ciclo-num">Número do ciclo</label>' +
          '<select class="text-field" id="cad-ciclo-num">' + buildCicloNumOptions(loja.ciclo.numero) + '</select>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field-group">' +
            '<label for="cad-ciclo-ini">Data de início</label>' +
            '<input type="date" class="text-field" id="cad-ciclo-ini" value="' + escapeHtml(loja.ciclo.dataInicio) + '" />' +
          '</div>' +
          '<div class="field-group">' +
            '<label for="cad-ciclo-fim">Data final</label>' +
            '<input type="date" class="text-field" id="cad-ciclo-fim" value="' + escapeHtml(loja.ciclo.dataFim) + '" />' +
          '</div>' +
        '</div>' +
        '<div class="field-group">' +
          '<label for="cad-ciclo-foco">Foco do ciclo</label>' +
          '<textarea class="text-area" id="cad-ciclo-foco" placeholder="Ex: Aumentar IAF e reforçar lançamentos do ciclo" style="min-height:56px;">' + escapeHtml(DATA.focoCiclo) + '</textarea>' +
          '<p style="font-size:11px;color:var(--text-muted);margin-top:2px;">O foco do ciclo é o mesmo para todas as lojas.</p>' +
        '</div>' +
      '</div>' +
    '</div>';

    html += '<div class="card">' +
      '<p class="sec-label">Renomear loja</p>' +
      '<div class="field-group">' +
        '<label for="cad-loja-nome">Nome da loja</label>' +
        '<input type="text" class="text-field" id="cad-loja-nome" value="' + escapeHtml(loja.nome) + '" autocomplete="off" />' +
      '</div>' +
    '</div>';

    html += '<div class="card">' +
      '<p class="sec-label">Vendedoras cadastradas</p>' +
      '<div class="vend-list" id="vend-list">';

    if (!loja.vendedoras.length) {
      html += '<p style="font-size:12.5px;color:var(--text-muted);padding:4px 2px 8px;">Nenhuma vendedora cadastrada ainda. Adicione abaixo para criar o checklist dela.</p>';
    } else {
      loja.vendedoras.forEach(function (vend) {
        html += '<div class="vend-row" data-vend="' + vend.id + '">' +
          '<input type="text" data-vend-name="' + vend.id + '" value="' + escapeHtml(vend.nome) + '" placeholder="Nome da vendedora" autocomplete="off" />' +
          '<button class="vend-remove" data-vend-remove="' + vend.id + '" title="Remover vendedora">&times;</button>' +
        '</div>';
      });
    }

    html += '</div>' +
      '<button class="btn-add-vend" id="btn-add-vend">+ Adicionar vendedora</button>' +
    '</div>';

    html += '<div class="card">' +
      '<p class="sec-label">Exportar</p>' +
      '<p style="font-size:12.5px;color:var(--text-muted);line-height:1.5;margin-bottom:12px;">Gera um Excel consolidado com o checklist de todas as vendedoras desta loja, cada uma em uma aba própria.</p>' +
      '<button class="btn btn-primary" id="btn-export-loja" style="width:100%;">' + iconSheet() + ' Exportar Excel da loja</button>' +
    '</div>';

    html += '<div class="card" style="border-color:var(--amber-light);">' +
      '<p class="sec-label">Início de novo ciclo</p>' +
      '<p style="font-size:12.5px;color:var(--text-muted);line-height:1.5;margin-bottom:12px;">Apaga os dados do ciclo (número, datas, foco) e todas as vendedoras com seus checklists desta loja. A loja "' + escapeHtml(loja.nome) + '" continua existindo, pronta para o novo ciclo.</p>' +
      '<button class="btn" id="btn-reset-ciclo" style="width:100%;color:var(--amber-dark);border-color:var(--amber-light);background:var(--amber-light);">Resetar ciclo</button>' +
    '</div>';

    if (DATA.lojas.length > 1) {
      html += '<div class="card" style="border-color:var(--red-light);">' +
        '<p class="sec-label">Zona de risco</p>' +
        '<button class="btn" id="btn-remove-store" style="width:100%;color:var(--red-dark);border-color:var(--red-light);background:var(--red-light);">Excluir loja "' + escapeHtml(loja.nome) + '"</button>' +
      '</div>';
    }

    area.innerHTML = html;
    wireCadastroEvents(loja);
  }

  function wireCadastroEvents(loja) {
    bindFieldEvent('cad-ciclo-num', 'change', function (v) { loja.ciclo.numero = v; });
    bindField('cad-ciclo-ini', function (v) { loja.ciclo.dataInicio = v; });
    bindField('cad-ciclo-fim', function (v) { loja.ciclo.dataFim = v; });
    bindField('cad-ciclo-foco', function (v) { DATA.focoCiclo = v; });

    bindField('cad-loja-nome', function (v) {
      loja.nome = v;
      renderStoreTabs();
    });

    var vendNameInputs = document.querySelectorAll('[data-vend-name]');
    forEachNode(vendNameInputs, function (input) {
      input.addEventListener('input', function () {
        var vend = getVendedora(loja, input.getAttribute('data-vend-name'));
        if (vend) {
          vend.nome = input.value;
          scheduleSave();
          renderSubTabs();
        }
      });
    });

    var removeButtons = document.querySelectorAll('[data-vend-remove]');
    forEachNode(removeButtons, function (btn) {
      btn.addEventListener('click', function () {
        var vendId = btn.getAttribute('data-vend-remove');
        var vend = getVendedora(loja, vendId);
        var nome = vend && vend.nome ? vend.nome : 'esta vendedora';
        openConfirmModal(
          'Remover vendedora',
          'Tem certeza que deseja remover "' + nome + '"? O checklist preenchido será perdido permanentemente.',
          function () {
            loja.vendedoras = loja.vendedoras.filter(function (v) { return v.id !== vendId; });
            if (DATA.activeSubTab[loja.id] === vendId) {
              setActiveSubTab(loja.id, 'cadastro');
            }
            scheduleSave();
            renderSubTabs();
            renderContent();
            showToast('Vendedora removida.');
          }
        );
      });
    });

    g('btn-add-vend').addEventListener('click', function () {
      var novaVend = makeVendedora('');
      loja.vendedoras.push(novaVend);
      scheduleSave();
      renderCadastro(loja, g('content-area'));
      renderSubTabs();
      var input = document.querySelector('[data-vend-name="' + novaVend.id + '"]');
      if (input) { input.focus(); }
    });

    var exportLojaBtn = g('btn-export-loja');
    if (exportLojaBtn) {
      exportLojaBtn.addEventListener('click', function () { handleExportLoja(loja); });
    }

    var resetCicloBtn = g('btn-reset-ciclo');
    if (resetCicloBtn) {
      resetCicloBtn.addEventListener('click', function () {
        openConfirmModal(
          'Resetar ciclo',
          'Tem certeza que deseja resetar o ciclo da loja "' + loja.nome + '"? Os dados do ciclo (número, datas, foco) e todas as vendedoras com seus checklists serão apagados permanentemente. A loja continuará existindo.',
          function () {
            loja.ciclo = { numero: '', dataInicio: '', dataFim: '', foco: '' };
            loja.vendedoras = [];
            setActiveSubTab(loja.id, 'cadastro');
            scheduleSave();
            renderSubTabs();
            renderContent();
            showToast('Ciclo resetado. Loja pronta para os novos dados.');
          }
        );
      });
    }

    var removeStoreBtn = g('btn-remove-store');
    if (removeStoreBtn) {
      removeStoreBtn.addEventListener('click', function () {
        openConfirmModal(
          'Excluir loja',
          'Tem certeza que deseja excluir a loja "' + loja.nome + '"? Todas as vendedoras e checklists dela serão perdidos permanentemente.',
          function () {
            DATA.lojas = DATA.lojas.filter(function (l) { return l.id !== loja.id; });
            if (DATA.activeStoreId === loja.id) {
              DATA.activeStoreId = DATA.lojas.length ? DATA.lojas[0].id : null;
            }
            scheduleSave();
            renderAll();
            showToast('Loja excluída.');
          }
        );
      });
    }
  }

  function bindField(id, setter) {
    bindFieldEvent(id, 'input', setter);
  }

  function bindFieldEvent(id, eventName, setter) {
    var el = g(id);
    if (!el) { return; }
    el.addEventListener(eventName, function () {
      setter(el.value);
      scheduleSave();
    });
  }

/* SCRIPT_PART_6 */

  /* =========================================================
     RENDER — Checklist da vendedora
     ========================================================= */
  function renderChecklist(loja, vend, area) {
    var adh = calcAderenciaVendedora(vend);
    var circumference = 2 * Math.PI * 32; // r=32
    var dashOffset = circumference - (adh.pct / 100) * circumference;

    var html = '';

    /* --- Cabeçalho: Atendente / Foco do ciclo (somente leitura, vem do cadastro) --- */
    html += '<div class="card">' +
      '<p class="sec-label">Identificação</p>' +
      '<div class="info-grid">' +
        '<div class="field-group">' +
          '<label>Atendente</label>' +
          '<div class="text-field" style="background:var(--surface2);color:var(--text-mid);">' + escapeHtml(vend.nome || 'Sem nome') + '</div>' +
        '</div>' +
        '<div class="field-group">' +
          '<label>Foco do ciclo</label>' +
          '<div class="text-field" style="background:var(--surface2);color:var(--text-mid);min-height:auto;white-space:pre-wrap;">' + (escapeHtml(DATA.focoCiclo) || '<span style="color:var(--text-muted)">Defina o foco do ciclo na aba Dados da Loja</span>') + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

    /* --- Aderência --- */
    html += '<div class="card">' +
      '<p class="sec-label">Aderência</p>' +
      '<div class="adh-overall">' +
        '<div class="adh-ring">' +
          '<svg viewBox="0 0 72 72">' +
            '<circle class="adh-ring-bg" cx="36" cy="36" r="32"></circle>' +
            '<circle class="adh-ring-fill" cx="36" cy="36" r="32" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + dashOffset + '"></circle>' +
          '</svg>' +
          '<div class="adh-ring-label">' + Math.round(adh.pct) + '%</div>' +
        '</div>' +
        '<div class="adh-overall-text">' +
          '<p class="big">' + adh.marcados + ' de ' + adh.total + ' itens marcados</p>' +
          '<p class="small">Aderência total do atendimento</p>' +
        '</div>' +
      '</div>' +
      '<div class="adh-bycat">';

    CHECKLIST_TEMPLATE.forEach(function (etapa, ei) {
      var pct = adh.porEtapaPct[ei];
      html += '<div class="adh-bycat-row">' +
        '<span class="adh-bycat-name">' + escapeHtml(etapa.etapa) + '</span>' +
        '<div class="adh-bycat-track"><div class="adh-bycat-fill" style="width:' + pct + '%;"></div></div>' +
        '<span class="adh-bycat-pct">' + Math.round(pct) + '%</span>' +
      '</div>';
    });

    html += '</div></div>';

    /* --- Etapas e itens --- */
    CHECKLIST_TEMPLATE.forEach(function (etapa, ei) {
      html += '<div class="card etapa-block">' +
        '<div class="etapa-title-row">' +
          '<span class="etapa-title">' + escapeHtml(etapa.etapa) + '</span>' +
          '<span class="etapa-badge">' + adh.porEtapa[ei].marcados + '/' + adh.porEtapa[ei].total + '</span>' +
        '</div>';

      etapa.itens.forEach(function (itemText, ii) {
        var key = ei + '_' + ii;
        var itemState = vend.checklist[key] || { checked: false, comentario: '' };
        var isOn = itemState.checked;
        var hasComment = itemState.comentario && itemState.comentario.trim().length > 0;

        html += '<div class="check-item' + (isOn ? ' on' : '') + '" data-key="' + key + '">' +
          '<div class="check-main">' +
            '<div class="check-box" data-toggle="' + key + '"></div>' +
            '<span class="check-text">' + escapeHtml(itemText) + '</span>' +
            '<div class="check-comment-toggle' + (hasComment ? ' has-text' : '') + '" data-comment-toggle="' + key + '" title="Observação">' + iconComment() + '</div>' +
          '</div>' +
          '<div class="check-comment-wrap' + (hasComment ? ' show' : '') + '" data-comment-wrap="' + key + '">' +
            '<textarea class="check-comment" data-comment-input="' + key + '" placeholder="Observação sobre este item...">' + escapeHtml(itemState.comentario) + '</textarea>' +
          '</div>' +
        '</div>';
      });

      html += '</div>';
    });

    /* --- Pontos fortes / Oportunidades / Plano de ação --- */
    html += '<div class="card notes-card">' +
      '<p class="sec-label">Avaliação qualitativa</p>' +
      '<div class="field-group">' +
        '<div class="notes-label-row"><span class="notes-dot green"></span><label for="notes-fortes">Pontos fortes</label></div>' +
        '<textarea class="text-area" id="notes-fortes" placeholder="O que a vendedora fez bem durante o atendimento...">' + escapeHtml(vend.pontosFortes) + '</textarea>' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="notes-label-row"><span class="notes-dot amber"></span><label for="notes-oport">Oportunidades de melhoria</label></div>' +
        '<textarea class="text-area" id="notes-oport" placeholder="O que pode ser melhorado...">' + escapeHtml(vend.oportunidades) + '</textarea>' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="notes-label-row"><span class="notes-dot blue"></span><label for="notes-plano">Plano de ação</label></div>' +
        '<textarea class="text-area" id="notes-plano" placeholder="Próximos passos combinados com a vendedora...">' + escapeHtml(vend.planoAcao) + '</textarea>' +
      '</div>' +
    '</div>';

    /* --- Botões de ação --- */
    html += '<div class="action-bar">' +
      '<button class="btn" id="btn-print">' + iconCamera() + ' Print</button>' +
      '<button class="btn" id="btn-export">' + iconSheet() + ' Exportar</button>' +
    '</div>';

    html += '<p class="page-footer">Maestria no Atendimento &middot; ' + escapeHtml(loja.nome) + '</p>';

    area.innerHTML = html;
    wireChecklistEvents(loja, vend);
  }

  function iconComment() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>';
  }
  function iconCamera() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>';
  }
  function iconSheet() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="16" y2="17"></line></svg>';
  }

/* SCRIPT_PART_7 */

  function wireChecklistEvents(loja, vend) {

    /* Toggle do check (X) — toque apenas na caixinha (check-box), nunca no texto */
    var mains = document.querySelectorAll('[data-toggle]');
    forEachNode(mains, function (el) {
      el.addEventListener('click', function () {
        var key = el.getAttribute('data-toggle');
        var state = vend.checklist[key];
        state.checked = !state.checked;
        scheduleSave();
        renderChecklist(loja, vend, g('content-area'));
        renderSubTabs();
      });
    });

    /* Toggle do painel de comentário */
    var commentToggles = document.querySelectorAll('[data-comment-toggle]');
    forEachNode(commentToggles, function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var key = btn.getAttribute('data-comment-toggle');
        var wrap = document.querySelector('[data-comment-wrap="' + key + '"]');
        if (wrap) {
          var willShow = wrap.className.indexOf('show') === -1;
          wrap.className = 'check-comment-wrap' + (willShow ? ' show' : '');
          if (willShow) {
            var textarea = wrap.querySelector('textarea');
            if (textarea) { setTimeout(function () { textarea.focus(); }, 50); }
          }
        }
      });
    });

    /* Inputs de comentário */
    var commentInputs = document.querySelectorAll('[data-comment-input]');
    forEachNode(commentInputs, function (textarea) {
      textarea.addEventListener('input', function () {
        var key = textarea.getAttribute('data-comment-input');
        vend.checklist[key].comentario = textarea.value;
        scheduleSave();
        var toggleBtn = document.querySelector('[data-comment-toggle="' + key + '"]');
        if (toggleBtn) {
          var hasText = textarea.value.trim().length > 0;
          toggleBtn.className = 'check-comment-toggle' + (hasText ? ' has-text' : '');
        }
      });
      textarea.addEventListener('click', function (e) { e.stopPropagation(); });
    });

    /* Notas qualitativas */
    bindField('notes-fortes', function (v) { vend.pontosFortes = v; });
    bindField('notes-oport', function (v) { vend.oportunidades = v; });
    bindField('notes-plano', function (v) { vend.planoAcao = v; });

    /* Botões */
    g('btn-print').addEventListener('click', function () { handlePrint(loja, vend); });
    g('btn-export').addEventListener('click', function () { handleExportLoja(loja); });
  }

/* SCRIPT_PART_8 */

  /* =========================================================
     PRINT — captura da tela em PNG
     ========================================================= */
  function handlePrint(loja, vend) {
    if (typeof html2canvas === 'undefined') {
      showToast('Não foi possível carregar a ferramenta de captura. Verifique sua conexão.');
      return;
    }
    var area = g('content-area');
    showToast('Gerando imagem...', 4000);

    /* Abre todos os comentários preenchidos para garantir que aparecem na imagem,
       e remove temporariamente os botões de ação da captura */
    var actionBar = area.querySelector('.action-bar');
    var originalDisplay = actionBar ? actionBar.style.display : null;
    if (actionBar) { actionBar.style.display = 'none'; }

    html2canvas(area, {
      backgroundColor: '#F2F1ED',
      scale: 2,
      useCORS: true
    }).then(function (canvas) {
      if (actionBar) { actionBar.style.display = originalDisplay || ''; }
      var link = document.createElement('a');
      var nomeArq = sanitizeFilename(loja.nome + '_' + (vend.nome || 'vendedora') + '_checklist') + getCicloFileTag(loja) + '_' + getTimestampSuffix();
      link.download = nomeArq + '.png';
      link.href = canvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('Imagem salva.');
    }).catch(function (err) {
      if (actionBar) { actionBar.style.display = originalDisplay || ''; }
      console.error('Erro ao gerar PNG:', err);
      showToast('Erro ao gerar a imagem. Tente novamente.');
    });
  }

  function sanitizeFilename(name) {
    return String(name)
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-zA-Z0-9_\- ]/g, '')
      .trim()
      .replace(/\s+/g, '_');
  }

  function pad2(n) { return (n < 10 ? '0' : '') + n; }

  /* Retorna sufixo de data/hora no formato DD_MM_AA_HHMMSS, para nomes de arquivo exportados */
  function getTimestampSuffix() {
    var d = new Date();
    var dd = pad2(d.getDate());
    var mm = pad2(d.getMonth() + 1);
    var yy = pad2(d.getFullYear() % 100);
    var hh = pad2(d.getHours());
    var mi = pad2(d.getMinutes());
    var ss = pad2(d.getSeconds());
    return dd + '_' + mm + '_' + yy + '_' + hh + mi + ss;
  }

  /* Retorna o trecho "_C12" (ou string vazia se não houver ciclo definido), para nomes de arquivo exportados */
  function getCicloFileTag(loja) {
    var numero = loja && loja.ciclo ? loja.ciclo.numero : '';
    if (!numero) { return ''; }
    return '_C' + sanitizeFilename(String(numero));
  }

  /* =========================================================
     EXPORT — estilos reutilizáveis para o Excel (xlsx-js-style)
     ========================================================= */
  var XLS_GREEN = '1D9E75';
  var XLS_GREEN_DARK = '0F6E56';
  var XLS_GREEN_LIGHT = 'E1F5EE';
  var XLS_AMBER_LIGHT = 'FAEEDA';
  var XLS_GREY_LIGHT = 'F2F1ED';
  var XLS_WHITE = 'FFFFFF';
  var XLS_TEXT = '191917';
  var XLS_BORDER = { style: 'thin', color: { rgb: 'D8D6CF' } };
  var XLS_BORDER_ALL = { top: XLS_BORDER, bottom: XLS_BORDER, left: XLS_BORDER, right: XLS_BORDER };

  function xlsCell(value, style) {
    var type = (typeof value === 'number') ? 'n' : 's';
    return { v: value === undefined || value === null ? '' : value, t: type, s: style || {} };
  }

  function xlsStyleTitle() {
    return { font: { bold: true, sz: 14, color: { rgb: XLS_TEXT } } };
  }
  function xlsStyleLabel() {
    return { font: { bold: true, sz: 10, color: { rgb: '55534E' } }, alignment: { vertical: 'center' } };
  }
  function xlsStyleValue() {
    return { font: { sz: 11, color: { rgb: XLS_TEXT } }, alignment: { vertical: 'center', wrapText: true } };
  }
  function xlsStyleHeaderRow() {
    return {
      font: { bold: true, sz: 11, color: { rgb: XLS_WHITE } },
      fill: { fgColor: { rgb: XLS_GREEN_DARK } },
      alignment: { vertical: 'center', horizontal: 'center', wrapText: true },
      border: XLS_BORDER_ALL
    };
  }
  function xlsStyleEtapaCell() {
    return {
      font: { bold: true, sz: 10.5, color: { rgb: XLS_GREEN_DARK } },
      fill: { fgColor: { rgb: XLS_GREEN_LIGHT } },
      alignment: { vertical: 'center', horizontal: 'left', wrapText: true },
      border: XLS_BORDER_ALL
    };
  }
  function xlsStyleItemCell() {
    return { font: { sz: 10.5, color: { rgb: XLS_TEXT } }, alignment: { vertical: 'center', wrapText: true }, border: XLS_BORDER_ALL };
  }
  function xlsStyleCheckCell(checked) {
    return {
      font: { bold: true, sz: 12, color: { rgb: checked ? XLS_GREEN_DARK : 'C2BFB6' } },
      alignment: { vertical: 'center', horizontal: 'center' },
      fill: { fgColor: { rgb: checked ? XLS_GREEN_LIGHT : XLS_WHITE } },
      border: XLS_BORDER_ALL
    };
  }
  function xlsStyleObsCell() {
    return { font: { sz: 10, italic: true, color: { rgb: '55534E' } }, alignment: { vertical: 'center', wrapText: true }, border: XLS_BORDER_ALL };
  }
  function xlsStyleSummaryLabel() {
    return { font: { bold: true, sz: 10.5, color: { rgb: XLS_TEXT } }, fill: { fgColor: { rgb: XLS_GREY_LIGHT } }, alignment: { vertical: 'center' }, border: XLS_BORDER_ALL };
  }
  function xlsStyleSummaryValue(highlight) {
    return {
      font: { bold: !!highlight, sz: highlight ? 12 : 10.5, color: { rgb: highlight ? XLS_GREEN_DARK : XLS_TEXT } },
      fill: { fgColor: { rgb: highlight ? XLS_AMBER_LIGHT : XLS_WHITE } },
      alignment: { vertical: 'center' },
      border: XLS_BORDER_ALL
    };
  }
  function xlsStyleSectionLabel() {
    return { font: { bold: true, sz: 10.5, color: { rgb: XLS_WHITE } }, fill: { fgColor: { rgb: XLS_GREEN } }, alignment: { vertical: 'center' }, border: XLS_BORDER_ALL };
  }
  function xlsStyleSectionText() {
    return { font: { sz: 10.5, color: { rgb: XLS_TEXT } }, alignment: { vertical: 'top', wrapText: true }, border: XLS_BORDER_ALL };
  }

/* SCRIPT_PART_9 */

  /* =========================================================
     EXPORT — Excel consolidado da loja (uma aba por vendedora)
     ========================================================= */
  function handleExportLoja(loja) {
    if (typeof XLSX === 'undefined') {
      showToast('Não foi possível carregar a ferramenta de exportação. Verifique sua conexão.');
      return;
    }
    if (!loja.vendedoras.length) {
      showToast('Nenhuma vendedora cadastrada nesta loja para exportar.');
      return;
    }

    var wb = XLSX.utils.book_new();

    /* --- Aba Resumo --- */
    var wsResumo = {};
    var resumoRefRows = 0;

    function setResumo(r, c, value, style) {
      var addr = XLSX.utils.encode_cell({ r: r, c: c });
      wsResumo[addr] = xlsCell(value, style);
      if (r + 1 > resumoRefRows) { resumoRefRows = r + 1; }
    }

    setResumo(0, 0, loja.nome + ' — Resumo do ciclo', xlsStyleTitle());
    setResumo(1, 0, 'Ciclo', xlsStyleSummaryLabel());
    setResumo(1, 1, loja.ciclo.numero || '-', xlsStyleSummaryValue());
    setResumo(2, 0, 'Início', xlsStyleSummaryLabel());
    setResumo(2, 1, loja.ciclo.dataInicio || '-', xlsStyleSummaryValue());
    setResumo(3, 0, 'Fim', xlsStyleSummaryLabel());
    setResumo(3, 1, loja.ciclo.dataFim || '-', xlsStyleSummaryValue());
    setResumo(4, 0, 'Foco do ciclo', xlsStyleSummaryLabel());
    setResumo(4, 1, DATA.focoCiclo || '-', xlsStyleSummaryValue());

    var resumoHeaderRow = 6;
    ['Vendedora', 'Itens marcados', 'Total de itens', 'Aderência'].forEach(function (h, ci) {
      setResumo(resumoHeaderRow, ci, h, xlsStyleHeaderRow());
    });
    loja.vendedoras.forEach(function (vend, vi) {
      var adh = calcAderenciaVendedora(vend);
      var r = resumoHeaderRow + 1 + vi;
      var highlight = adh.pct >= 80;
      setResumo(r, 0, vend.nome || 'Sem nome', xlsStyleItemCell());
      setResumo(r, 1, adh.marcados, xlsStyleSummaryValue());
      setResumo(r, 2, adh.total, xlsStyleSummaryValue());
      setResumo(r, 3, Math.round(adh.pct) + '%', xlsStyleSummaryValue(highlight));
    });

    wsResumo['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: resumoRefRows - 1, c: 3 } });
    wsResumo['!cols'] = [{ wch: 28 }, { wch: 16 }, { wch: 16 }, { wch: 14 }];
    wsResumo['!rows'] = [{ hpt: 22 }];
    wsResumo['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 3 } }];
    wsResumo['!freeze'] = { xSplit: 0, ySplit: resumoHeaderRow + 1 };
    XLSX.utils.book_append_sheet(wb, wsResumo, 'Resumo');

    /* --- Uma aba por vendedora, seguindo o layout do checklist original, com visual aprimorado --- */
    loja.vendedoras.forEach(function (vend) {
      var adh = calcAderenciaVendedora(vend);
      var ws = {};
      var r = 0;
      var maxRow = 0;

      function setCell(row, col, value, style) {
        var addr = XLSX.utils.encode_cell({ r: row, c: col });
        ws[addr] = xlsCell(value, style);
        if (row + 1 > maxRow) { maxRow = row + 1; }
      }

      setCell(r, 0, vend.nome || 'Sem nome', xlsStyleTitle());
      r += 1;
      setCell(r, 0, 'Foco do ciclo', xlsStyleSummaryLabel());
      setCell(r, 1, DATA.focoCiclo || '-', xlsStyleSummaryValue());
      r += 1;
      setCell(r, 0, 'Aderência total', xlsStyleSummaryLabel());
      setCell(r, 1, Math.round(adh.pct) + '% (' + adh.marcados + ' de ' + adh.total + ' itens)', xlsStyleSummaryValue(true));
      r += 2;

      var headerRow = r;
      ['Etapa Maestria', 'Item do Checklist', 'Checklist', 'Observação'].forEach(function (h, ci) {
        setCell(headerRow, ci, h, xlsStyleHeaderRow());
      });
      r += 1;

      var merges = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 3 } }];

      CHECKLIST_TEMPLATE.forEach(function (etapa, ei) {
        var etapaStartRow = r;
        etapa.itens.forEach(function (itemText, ii) {
          var key = ei + '_' + ii;
          var state = vend.checklist[key] || { checked: false, comentario: '' };
          setCell(r, 0, ii === 0 ? etapa.etapa : '', xlsStyleEtapaCell());
          setCell(r, 1, itemText, xlsStyleItemCell());
          setCell(r, 2, state.checked ? 'X' : '', xlsStyleCheckCell(state.checked));
          setCell(r, 3, state.comentario || '', xlsStyleObsCell());
          r += 1;
        });
        if (etapa.itens.length > 1) {
          merges.push({ s: { r: etapaStartRow, c: 0 }, e: { r: r - 1, c: 0 } });
        }
      });

      r += 1;
      setCell(r, 0, 'Pontos Fortes', xlsStyleSectionLabel());
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 3 } });
      r += 1;
      setCell(r, 0, vend.pontosFortes || '-', xlsStyleSectionText());
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 3 } });
      r += 2;

      setCell(r, 0, 'Oportunidades de Melhoria', xlsStyleSectionLabel());
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 3 } });
      r += 1;
      setCell(r, 0, vend.oportunidades || '-', xlsStyleSectionText());
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 3 } });
      r += 2;

      setCell(r, 0, 'Plano de Ação', xlsStyleSectionLabel());
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 3 } });
      r += 1;
      setCell(r, 0, vend.planoAcao || '-', xlsStyleSectionText());
      merges.push({ s: { r: r, c: 0 }, e: { r: r, c: 3 } });

      ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: maxRow - 1, c: 3 } });
      ws['!cols'] = [{ wch: 20 }, { wch: 52 }, { wch: 11 }, { wch: 36 }];
      ws['!rows'] = [{ hpt: 22 }];
      ws['!merges'] = merges;
      ws['!freeze'] = { xSplit: 0, ySplit: headerRow + 1 };

      var sheetName = sanitizeSheetName(vend.nome || 'Vendedora');
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });

    var nomeArq = sanitizeFilename(loja.nome + '_checklists_maestria') + getCicloFileTag(loja) + '_' + getTimestampSuffix();
    XLSX.writeFile(wb, nomeArq + '.xlsx');
    showToast('Excel exportado.');
  }

  function sanitizeSheetName(name) {
    /* Excel sheet names: max 31 chars, no : \ / ? * [ ] */
    var clean = String(name).replace(/[:\\\/\?\*\[\]]/g, '').trim();
    if (!clean) { clean = 'Vendedora'; }
    return clean.slice(0, 31);
  }

/* SCRIPT_PART_10 */

  /* =========================================================
     MODAL — Nova loja
     ========================================================= */
  function openAddStoreModal() {
    g('new-store-name').value = '';
    g('modal-add-store').className = 'modal-overlay show';
    setTimeout(function () { g('new-store-name').focus(); }, 80);
  }
  window.closeAddStoreModal = function () {
    g('modal-add-store').className = 'modal-overlay';
  };
  window.confirmAddStore = function () {
    var nameInput = g('new-store-name');
    var nome = nameInput.value.trim();
    if (!nome) {
      nameInput.focus();
      return;
    }
    var novaLoja = makeLoja(nome);
    DATA.lojas.push(novaLoja);
    DATA.activeStoreId = novaLoja.id;
    setActiveSubTab(novaLoja.id, 'cadastro');
    scheduleSave();
    window.closeAddStoreModal();
    renderAll();
    showToast('Loja "' + nome + '" criada.');
  };

  /* Enter key submits the add-store modal */
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && g('modal-add-store').className.indexOf('show') !== -1) {
      var active = document.activeElement;
      if (active && active.id === 'new-store-name') {
        window.confirmAddStore();
      }
    }
  });

  /* =========================================================
     MODAL — Confirmação genérica (remover vendedora / loja)
     ========================================================= */
  var pendingConfirmAction = null;
  function openConfirmModal(title, text, onConfirm) {
    g('modal-confirm-title').textContent = title;
    g('modal-confirm-text').textContent = text;
    pendingConfirmAction = onConfirm;
    g('modal-confirm').className = 'modal-overlay show';
  }
  window.closeConfirmModal = function () {
    g('modal-confirm').className = 'modal-overlay';
    pendingConfirmAction = null;
  };
  g('modal-confirm-btn').addEventListener('click', function () {
    if (pendingConfirmAction) {
      var action = pendingConfirmAction;
      pendingConfirmAction = null;
      g('modal-confirm').className = 'modal-overlay';
      action();
    }
  });

  /* Close modals on overlay click (not on box click) */
  document.addEventListener('click', function (e) {
    if (e.target.id === 'modal-add-store') { window.closeAddStoreModal(); }
    if (e.target.id === 'modal-confirm') { window.closeConfirmModal(); }
  });

  /* =========================================================
     INIT
     ========================================================= */
  function renderAll() {
    if (!DATA.activeStoreId || !getLoja(DATA.activeStoreId)) {
      DATA.activeStoreId = DATA.lojas.length ? DATA.lojas[0].id : null;
    }
    renderStoreTabs();
    renderSubTabs();
    renderContent();
  }

  function init() {
    DATA = loadData();
    if (!DATA.activeStoreId && DATA.lojas.length) {
      DATA.activeStoreId = DATA.lojas[0].id;
    }
    renderAll();
  }

  init();
})();
</script>
